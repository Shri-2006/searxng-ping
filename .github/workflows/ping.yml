name: Keep SearXNG Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SearXNG Space
        run: |
          echo "Pinging SearXNG at $(date -u)"
          URL="${{ secrets.SEARXNG_URL }}/search?q=test&format=json"
          STATUS=$(curl -L -s -o /tmp/out.txt -w "%{http_code}" "$URL" --max-time 45)
          echo "Response status: $STATUS"
          echo "Response preview:"
          head -c 300 /tmp/out.txt || true
          echo

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "429" ]; then
            echo "✅ SearXNG is responding"
            exit 0
          fi

          echo "❌ SearXNG unhealthy or stuck"
          exit 1
